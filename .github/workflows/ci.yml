name: CI

on:
  push:
    branches: [main]
  pull_request:

# Docker Hub auth (optional) lifts the anonymous image-pull rate limit that
# `supabase start` hits (toomanyrequests). No-op unless the secrets are set.
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint
      - run: yarn typecheck
      - run: yarn format
      - run: yarn test

      # DB/RLS integration tests against a real local Supabase (docs/00 D8).
      - name: Log in to Docker Hub (raises the image-pull rate limit — skipped without secrets)
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Start local Supabase
        run: yarn supabase start -x studio,imgproxy,logflare,vector

      - run: yarn test:db

      - run: yarn build

  e2e:
    # E2E on main merges + manual runs (docs/17 B).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Log in to Docker Hub (raises the image-pull rate limit — skipped without secrets)
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Start local Supabase
        run: yarn supabase start -x studio,imgproxy,logflare,vector

      - name: Write .env.local from local Supabase
        run: |
          eval "$(yarn --silent supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')"
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          STORAGE_DRIVER=local
          UPLOAD_SESSION_SECRET=ci-e2e-only-secret
          TURNSTILE_BYPASS=1
          ADMIN_EMAILS=op@onetribe.world
          EOF

      - run: yarn build
      - run: npx playwright install --with-deps chromium
      - run: yarn test:e2e
        env:
          CI: 'true'
