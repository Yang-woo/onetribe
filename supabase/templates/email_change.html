<!-- D16 email-linking confirmation code (replaces the confirmation link — mirror in the prod dashboard). -->
<div
  style="
    background: #0b0908;
    color: #f5efe6;
    font-family: system-ui, sans-serif;
    padding: 32px;
    border-radius: 12px;
    max-width: 420px;
  "
>
  <p style="margin: 0 0 4px; font-size: 14px; color: #a39a90">
    one <span style="color: #ff6a00">tribe</span>
  </p>
  <h2 style="margin: 0 0 16px; font-size: 18px; font-weight: 600">confirm your passport email</h2>
  <p style="margin: 0 0 20px; font-size: 14px; color: #a39a90">
    Enter this code to connect this email to your festival passport. It expires in 1 hour.
  </p>
  <p style="margin: 0; font-size: 32px; letter-spacing: 8px; font-weight: 700">{{ .Token }}</p>
  <p style="margin: 20px 0 0; font-size: 12px; color: #a39a90">
    Didn't request this? You can ignore this email.
  </p>
</div>
